<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTS Attendance System | ມຂ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .video-container { position: relative; overflow: hidden; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="max-w-6xl mx-auto px-4 pt-8">
        <nav class="glass rounded-2xl p-4 mb-8 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="scan-face"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl text-slate-800 uppercase">DTS Attendance</h1>
                    <p class="text-xs text-blue-600">Faculty of IT - Savannakhet University</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showSection('scan')" class="px-4 py-2 rounded-xl hover:bg-blue-50 transition">ເຊັກຊື່</button>
                <button onclick="showSection('manage')" class="px-4 py-2 rounded-xl hover:bg-blue-50 transition text-slate-600">ຈັດການຂໍ້ມູນ</button>
            </div>
        </nav>

        <section id="section-scan" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="video-container bg-black aspect-video flex items-center justify-center">
                    <video id="video" autoplay muted playsinline class="w-full h-full object-cover"></video>
                    <canvas id="overlay"></canvas>
                    <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 text-white gap-4">
                        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
                        <p>ກຳລັງໂຫຼດລະບົບ AI...</p>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                        <i data-lucide="history" class="text-blue-600"></i> ລາຍຊື່ທີ່ກວດພົບ
                    </h3>
                    <div id="attendance-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        <p class="text-sm text-slate-400 text-center py-10">ລໍຖ້າການສະແກນໃບໜ້າ...</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- ຄ່າຄອນຟິກ ແລະ ໂຕປ່ຽນ ---
        const GAS_URL = 'YOUR_DEPLOY_URL'; // ໃສ່ URL ທີ່ໄດ້ຈາກການ Deploy code.gs
        let faceMatcher;
        const THRESHOLD = 0.45; // ຄ່າຄວາມແມ່ນຍຳ (ຍິ່ງໜ້ອຍຍິ່ງຊັດເຈນ)

        async function init() {
            lucide.createIcons();
            await loadModels();
            startVideo();
            loadStudentDatabase();
        }

        async function loadModels() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            document.getElementById('loader').classList.add('hidden');
        }

        async function startVideo() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            video.addEventListener('play', onVideoPlay);
        }

        async function onVideoPlay() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('overlay');
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                if (faceMatcher && resizedDetections.length > 0) {
                    resizedDetections.forEach(detection => {
                        const result = faceMatcher.findBestMatch(detection.descriptor);
                        // ກວດສອບຖ້າຄວາມແມ່ນຍຳຜ່ານເກນ (Threshold)
                        if (result.distance < THRESHOLD) {
                            markAttendance(result.label);
                        }
                        
                        // ແຕ້ມກອບໃບໜ້າ
                        new faceapi.draw.DrawBox(detection.detection.box, { 
                            label: result.toString(),
                            boxColor: result.distance < THRESHOLD ? '#10b981' : '#ef4444' 
                        }).draw(canvas);
                    });
                }
            }, 1000);
        }

        async function loadStudentDatabase() {
            // ດຶງຂໍ້ມູນຈາກ Google Sheets ມາສ້າງ LabeledFaceDescriptors
            // ... (Logic ຄືກັບຂອງເດີມ ແຕ່ໃຊ້ THRESHOLD ທີ່ກຳນົດໄວ້ດ້ານເທິງ)
        }

        function markAttendance(name) {
            // Logic ການບັນທຶກລົງລາຍຊື່ ແລະ ສົ່ງໄປ Backend
            console.log("ກວດພົບ:", name);
        }

        init();
    </script>
</body>
</html>
