<style>
    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
    body { font-family: 'Kanit', sans-serif; background: #f1f5f9; }
</style>

<script>
    // ปรับค่าความแม่นยำ (0.4 - 0.5 จะเข้มงวดกว่า 0.6)
    const RECOGNITION_THRESHOLD = 0.45; 

    // ปรับปรุงฟังก์ชันการตรวจสอบใบหน้า
    async function onVideoPlay() {
        document.getElementById('video-loader').style.display = 'none';
        document.getElementById('video-wrapper').classList.remove('hidden');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const displaySize = { width: video.clientWidth, height: video.clientHeight };
        faceapi.matchDimensions(overlay, displaySize);

        if (recognitionInterval) clearInterval(recognitionInterval);
        recognitionInterval = setInterval(async () => {
            if (!isScanning) return;
            
            // เพิ่มการตรวจจับแบบ SSD MobileNetV1 ที่มีความแม่นยำสูงกว่า TinyFaceDetector
            const detections = await faceapi.detectAllFaces(video)
                .withFaceLandmarks()
                .withFaceDescriptors();
            
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
            
            if (faceMatcher) {
                resizedDetections.forEach(detection => {
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    
                    // ตรวจสอบความถูกต้องตาม Threshold ที่กำหนด
                    if (bestMatch.distance < RECOGNITION_THRESHOLD) {
                        const student = students.find(s => s.name === bestMatch.label);
                        if (student && !checkedInToday.has(student.studentid)) {
                             handleRecognition(student);
                        }
                    }
                });
            }
        }, 500); // ปรับเพิ่มเวลา interval เล็กน้อยเพื่อลดภาระ CPU
    }
</script>
